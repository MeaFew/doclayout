name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ dashboard/
      - run: ruff format --check src/ tests/ dashboard/

  test:
    # paddlepaddle + paddleocr are heavy (~hundreds of MB) and CPU-memory hungry;
    # we do NOT install them in CI. Tests cover config wiring and the region→COCO
    # mapping logic (pure Python) and deliberately never import paddle.
    # Light runtime deps (numpy / Pillow / pycocotools-windows) come from
    # pyproject [project].dependencies via the editable install below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=doclayout --cov-report=term-missing --cov-fail-under=60

  typecheck:
    # Gradual typing: mypy reports but does not block CI yet.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy
      - run: mypy src/doclayout || true
